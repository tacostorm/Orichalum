name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          zip -r orichalum.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "DESIGN.md" \
            --exclude "README.md" \
            --exclude "*.zip"

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: orichalum.zip